name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  INFRA_REPOSITORY: ${{ secrets.INFRA_REPOSITORY }}

jobs:
  # ─── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint Backend
        working-directory: backend
        run: |
          npm ci
          npm run lint

      - name: Lint Frontend
        working-directory: frontend
        run: |
          npm ci
          npx eslint src --ext .js,.jsx --max-warnings=10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint Worker (flake8)
        working-directory: worker
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8
          flake8 worker.py --max-line-length=120 --ignore=E501,W503

  # ─── 2. Build & Push Docker Images ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${GITHUB_SHA::8}"
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-backend:${{ steps.meta.outputs.image_tag }}
            ${{ secrets.DOCKER_USERNAME }}/ai-task-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-worker:${{ steps.meta.outputs.image_tag }}
            ${{ secrets.DOCKER_USERNAME }}/ai-task-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runner
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:${{ steps.meta.outputs.image_tag }}
            ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Summary ─────────────────────────────────────────────────────────────
  summary:
    name: Build Complete
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Success Message
        run: |
          echo "✅ Pipeline successful!"
          echo "Docker images pushed:"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/ai-task-backend:${{ needs.build-and-push.outputs.image_tag }}"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/ai-task-worker:${{ needs.build-and-push.outputs.image_tag }}"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:${{ needs.build-and-push.outputs.image_tag }}"
          echo ""
          echo "Also tagged as 'latest'"
