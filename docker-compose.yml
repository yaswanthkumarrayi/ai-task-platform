services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: ai-task-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai-task-platform
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-task-net

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ai-task-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-task-net

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: ai-task-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/ai-task-platform
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/ready"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - ai-task-net

  # ─── Worker ─────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
      target: runner
    container_name: ai-task-worker
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/ai-task-platform
      REDIS_URL: redis://redis:6379
      REDIS_QUEUE_NAME: ai-tasks
      REDIS_BLOCK_TIMEOUT: "5"
      MAX_RETRIES: "3"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-task-net
    # Scale workers: docker-compose up --scale worker=3
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: ai-task-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-task-net

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  ai-task-net:
    driver: bridge
